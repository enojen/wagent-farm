packages:
  - 'apps/*'
  - 'packages/*'

# Centralized dependency versions. Reference with `"<dep>": "catalog:"`.
catalog:
  typescript: 6.0.3
  '@types/node': 25.9.3
  eslint: 10.4.1
  '@eslint/js': 10.0.1
  typescript-eslint: 8.61.0
  globals: 17.6.0
  vitest: 4.1.8
  prettier: 3.8.4
  tsx: 4.22.4

  # Declared ahead of the phases that introduce them; not installed until referenced.
  zod: 4.4.3
  drizzle-orm: 0.45.2
  drizzle-kit: 0.31.10
  pg: 8.21.0
  '@types/pg': 8.20.0
  # ≤0.4.x only: 0.5.x dropped the `/vector` subpath (pgvector moved to a separate add-on).
  '@electric-sql/pglite': 0.4.6
  hono: 4.12.25
  '@mastra/core': 1.42.0
